name: Plyrium Echo Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.1"
        required: true
        default: "1.0.16"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            requirements: requirements-windows.txt
            artifact: Plyrium-Echo-Setup.exe
          - name: macos
            os: macos-latest
            requirements: requirements-macos.txt
            artifact: Plyrium-Echo-macOS.zip
          - name: linux
            os: ubuntu-latest
            requirements: requirements-linux.txt
            artifact: Plyrium-Echo-Linux.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libasound2-dev libgtk-3-dev libappindicator3-dev libfuse2t64 xclip

      - name: Install Windows NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ matrix.requirements }}"
          pip install pyinstaller

      - name: Generate macOS app icon
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p build/echo.iconset
          for size in 16 32 64 128 256 512; do
            sips -z "$size" "$size" assets/brand/echo-app-icon.png --out "build/echo.iconset/icon_${size}x${size}.png"
          done
          sips -z 32 32 assets/brand/echo-app-icon.png --out build/echo.iconset/icon_16x16@2x.png
          sips -z 64 64 assets/brand/echo-app-icon.png --out build/echo.iconset/icon_32x32@2x.png
          sips -z 256 256 assets/brand/echo-app-icon.png --out build/echo.iconset/icon_128x128@2x.png
          sips -z 512 512 assets/brand/echo-app-icon.png --out build/echo.iconset/icon_256x256@2x.png
          sips -z 1024 1024 assets/brand/echo-app-icon.png --out build/echo.iconset/icon_512x512@2x.png
          iconutil -c icns build/echo.iconset -o assets/brand/echo-app-icon.icns

      - name: Run unit tests
        shell: bash
        run: |
          python tests/test_audio_devices.py
          python tests/test_format.py
          python tests/test_gate.py
          python tests/test_hotkey_bindings.py
          python tests/test_updater.py
          python tests/test_model_runtime.py

      - name: Build app
        shell: bash
        run: pyinstaller PlyriumEcho-ci.spec --noconfirm

      - name: Sign macOS bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          APP_DIR="dist/Plyrium Echo"
          APP_BUNDLE="dist/Plyrium Echo.app"
          # PyInstaller onedir embeds Python.framework plus native dylibs.
          # If those nested Mach-O files are unsigned, Gatekeeper reports
          # Python.framework as "damaged" after download/extraction.
          while IFS= read -r file; do
            if file "$file" | grep -q "Mach-O"; then
              codesign --force --sign - --timestamp=none "$file"
            fi
          done < <(find "$APP_DIR" "$APP_BUNDLE" -type f)
          find "$APP_DIR" "$APP_BUNDLE" -type d -name "*.framework" -print0 \
            | xargs -0 -I {} codesign --force --deep --sign - --timestamp=none "{}"
          xattr -cr "$APP_DIR" "$APP_BUNDLE" || true
          codesign --force --deep --sign - --timestamp=none "$APP_BUNDLE"
          codesign --verify --deep --strict "$APP_BUNDLE"

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $makensis = (Get-Command makensis.exe -ErrorAction SilentlyContinue).Source
          if (-not $makensis) {
            $candidates = @(
              "C:\Program Files (x86)\NSIS\makensis.exe",
              "C:\Program Files (x86)\NSIS\Bin\makensis.exe",
              "C:\Program Files\NSIS\makensis.exe",
              "C:\Program Files\NSIS\Bin\makensis.exe"
            )
            $makensis = $candidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          }
          if (-not $makensis) { throw "makensis.exe not found after NSIS install" }
          & $makensis PlyriumEcho.nsi

      - name: Package macOS zip
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/Plyrium Echo.app" "dist/Plyrium-Echo-macOS.zip"

      - name: Package Linux zip
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          tar -czf "Plyrium-Echo-Linux.tar.gz" "Plyrium Echo"

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          cd dist
          mkdir -p Echo.AppDir/usr/bin Echo.AppDir/usr/share/applications Echo.AppDir/usr/share/icons/hicolor/256x256/apps
          cp -a "Plyrium Echo/." Echo.AppDir/usr/bin/
          cp ../assets/brand/echo-app-icon.png Echo.AppDir/plyrium-echo.png
          cp ../assets/brand/echo-app-icon.png Echo.AppDir/usr/share/icons/hicolor/256x256/apps/plyrium-echo.png
          cat > Echo.AppDir/plyrium-echo.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Plyrium Echo
          Exec=Plyrium Echo
          Icon=plyrium-echo
          Categories=Utility;Audio;
          Terminal=false
          EOF
          cp Echo.AppDir/plyrium-echo.desktop Echo.AppDir/usr/share/applications/plyrium-echo.desktop
          cat > Echo.AppDir/AppRun <<'EOF'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Plyrium Echo" "$@"
          EOF
          chmod +x Echo.AppDir/AppRun "Echo.AppDir/usr/bin/Plyrium Echo"
          curl -L -o appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool Echo.AppDir Plyrium-Echo-Linux.AppImage

      - name: Write checksum
        shell: bash
        run: |
          cd dist
          python - <<'PY'
          import hashlib
          import pathlib
          artifacts = [pathlib.Path("${{ matrix.artifact }}")]
          if "${{ matrix.name }}" == "linux":
              artifacts.append(pathlib.Path("Plyrium-Echo-Linux.AppImage"))
          lines = []
          for p in artifacts:
              digest = hashlib.sha256(p.read_bytes()).hexdigest()
              line = f"{digest}  {p.name}\n"
              p.with_name(p.name + ".sha256").write_text(line, encoding="ascii")
              lines.append(line)
          pathlib.Path("SHA256SUMS-${{ matrix.name }}.txt").write_text("".join(lines), encoding="ascii")
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: echo-${{ matrix.name }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
            dist/Plyrium-Echo-Linux.AppImage
            dist/Plyrium-Echo-Linux.AppImage.sha256
            dist/SHA256SUMS-${{ matrix.name }}.txt

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Combine checksums
        run: |
          cat release-assets/SHA256SUMS-*.txt > release-assets/SHA256SUMS.txt
          rm release-assets/SHA256SUMS-*.txt

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Plyrium Echo ${{ steps.tag.outputs.tag }}
          files: release-assets/*
          body: |
            Plyrium Echo cross-platform release.

            Assets:
            - Windows installer: Plyrium-Echo-Setup.exe
            - macOS zip: Plyrium-Echo-macOS.zip
            - Linux AppImage: Plyrium-Echo-Linux.AppImage
            - Linux tarball: Plyrium-Echo-Linux.tar.gz
            - Checksums: SHA256SUMS.txt
